version: "3"

output: prefixed

vars:
  infra: "packages/infrastructure"
  webapp: "packages/webapp"
  lambdas: "packages/repo-collector"
  types: "packages/repo-collector-types"

tasks:
  default:
    cmds:
      - task: build

  build:
    desc: Build project
    deps: [install-deps]
    cmds:
      - task: lint
      - task: infra.build

  install-deps:
    desc: Install project dependencies
    cmd: bun install

  fmt:
    desc: Format project
    cmd: bun run fmt

  fmt-check:
    desc: Check code formatting
    cmd: bun run fmt:check

  lint:
    desc: Lint project
    cmd: bun run lint

  lint-fix:
    desc: Fix linting issues
    cmd: bun run lint:fix

  snapshots:
    desc: Update infrastructure snapshots
    deps: [infra.snapshots]

  check-snapshots:
    desc: Check if infrastructure snapshots are up-to-date
    deps: [infra.check-snapshots]

  clean:
    desc: Clean project
    deps: [infra.clean, webapp.clean, lambdas.clean, types.clean]

  clean-all:
    desc: Clean project and dependencies
    deps:
      [infra.clean, webapp.clean, lambdas.clean, types.clean]
    cmds:
      - rm -rf node_modules

  # test if AWS session exists here?
  update-local-data:
    desc: Update local data (local file system)
    cmds:
      - task: lambdas.update-local-data

  download-s3-data:
    desc: Download data from S3
    cmds:
      - task: lambdas.download-s3-data

  serve-local-data:
    desc: Serve local data
    cmds:
      - task: lambdas.serve-local-data

  start-webserver:
    desc: Start webserver for webapp
    cmds:
      - task: webapp.start-webserver

  # test if AWS session exists here?
  update-remote-data:
    desc: Update remote data (the running instance of repo-metrics)
    cmds:
      - task: lambdas.update-remote-data

  upgrade-deps:
    desc: Update dependencies
    cmd: bun run upgrade-deps

  migrate-biome-schema:
    desc: Migrate biome schema
    cmd: bunx biome migrate --write

  lockfile-maintenance:
    desc: Refresh lockfiles and update snapshots
    cmds:
      - rm -rf bun.lock
      - rm -rf node_modules
      - bun install
      - task: infra.build

  ################################
  # infra
  ################################
  infra.build:
    dir: "{{.infra}}"
    deps: [lambdas.build, webapp.build]
    cmds:
      - task: infra.snapshots

  infra.snapshots:
    dir: "{{.infra}}"
    cmd: bun run snapshots

  infra.check-snapshots:
    dir: "{{.infra}}"
    cmds:
      - git status __snapshots__
      - git add __snapshots__ --intent-to-add
      - git diff --exit-code __snapshots__

  infra.clean:
    dir: "{{.infra}}"
    cmd: rm -rf cdk.out

  ################################
  # lambdas
  ################################
  lambdas.build:
    dir: "{{.lambdas}}"
    deps: [types.build]
    cmds:
      - bun run test
      - bun run build

  lambdas.update-local-data:
    dir: "{{.lambdas}}"
    cmds:
      - bun run collect-locally
      - bun run aggregate-locally

  lambdas.report-locally:
    dir: "{{.lambdas}}"
    cmd: bun run report-locally

  lambdas.serve-local-data:
    dir: "{{.lambdas}}"
    cmd: bun run serve

  lambdas.download-s3-data:
    dir: "{{.lambdas}}"
    cmd: ./fetch-s3-data.sh

  lambdas.update-remote-data:
    dir: "{{.lambdas}}"
    cmd: aws stepfunctions start-execution --state-machine-arn "arn:aws:states:eu-west-1:001112238813:stateMachine:StateMachine2E01A3A5-2QjhssOgQmZm"

  lambdas.clean:
    dir: "{{.lambdas}}"
    cmd: rm -rf dist

  ################################
  # webapp
  ################################
  webapp.build:
    dir: "{{.webapp}}"
    deps: [types.build]
    cmds:
      - bun run build

  webapp.clean:
    dir: "{{.webapp}}"
    cmds:
      - rm -rf dist
      - rm -rf build
      - rm -rf coverage

  webapp.start-webserver:
    dir: "{{.webapp}}"
    cmd: bun run start

  ################################
  # types
  ################################
  types.build:
    dir: "{{.types}}"
    run: once
    cmds:
      - bun run build

  types.clean:
    dir: "{{.types}}"
    cmd: rm -rf lib
